[tox]
skipsdist = True
usedevelop = True

envlist =
    wt70-dj42-py{310,311,312}
    wt70-dj52-py{310,311,312,313}
    wt73-dj42-py{310,311,312}
    wt73-dj52-py{310,311,312,313}
    wt73-dj60-py{312,313,314}
    wt74-dj52-py{310,311,312,313}
    wt74-dj60-py{312,313,314}

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313
    3.14: py314


[testenv]
description = Unit tests against published packages
install_command = pip install -e ".[testing]" -U {opts} {packages}
commands = coverage run --source=wagtailmenus runtests.py

deps =
    coverage
    dj42: Django>=4.2,<4.3
    dj52: Django>=5.2,<5.3
    dj60: Django>=6.0,<6.1
    wt70: wagtail>=7.0,<7.1
    wt73: wagtail>=7.3,<7.4
    wt74: wagtail>=7.4,<7.5

[testenv:future]
description = Unit tests against the latest development versions of dependencies
install_command = pip install -e ".[testing]" -U {opts} {packages}
commands = coverage run --source=wagtailmenus runtests.py
basepython = python3.14

deps =
    coverage
    beautifulsoup4>=4.13.3
    git+https://github.com/wagtail/wagtail.git@main#egg=wagtail
